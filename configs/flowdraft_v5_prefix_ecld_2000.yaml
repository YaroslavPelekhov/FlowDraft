# Long-run categorical Flow Map.  This remains an Orthrus-compatible endpoint
# CFM, with frozen AR distributions as every target.  The added top-1/prefix
# terms are verifier-derived auxiliary objectives for greedy acceptance.
upstream_dir: upstream_orthrus
base_model: Qwen/Qwen3-1.7B
block_size: 32
mask_token_id: 151669
source_prior: uniform
source_seed: 2718

batch_size: 1
gradient_accumulation_steps: 8
num_anchor_blocks: 128
epochs: 1
max_steps: 2000
learning_rate: 0.00008
warmup_ratio: 0.04
weight_decay: 0.0
max_grad_norm: 1.0
dtype: bf16
attn_implementation: eager
temperature: 1.0
kl_reduction: tokenmean

flow_objective: ecld
# With 128 anchors, 68 diagonal and 60 off-diagonal blocks keep the ECLD
# FlexAttention sequence length (60 * 32) divisible by its required 128.
diagonal_fraction: 0.53125
one_jump_fraction: 0.55
flow_time_logit_mean: -0.4
flow_time_logit_std: 1.0
flow_time_max: 0.95
flow_time_conditioning_scale: 0.05
flow_state_adapter: true
flow_adapter_bottleneck: 256
endpoint_transport: dense
endpoint_vocab_chunk_size: 8192
ecld_time_weight: paper_clamped
temporal_difference_epsilon: 0.02
temporal_drift_weight: 1.0

direct_endpoint_teacher_weight: 1.0
direct_prefix_kl_weight: 0.35
hard_ce_weight: 0.35
prefix_loss_weight: 1.0
prefix_kl_weight: 0.15
prefix_weight_decay: 0.92
consistency_weight: 0.00025
consistency_start_step: 250

eval_every: 100
eval_batches: 32
eval_anchor_blocks: 64
eval_seed: 1701
best_metric: eval_greedy_prefix_acceptance
early_stopping_patience: 6
save_every: 100
checkpoint_format: trainable
save_trainer_state: false
gradient_checkpointing: false
compile: false
seed: 17
num_workers: 2
log_every: 10
