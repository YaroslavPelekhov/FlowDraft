# Fast one-pass screen: a coupled endpoint flow map over all seven draft
# positions. Continuous token endpoints are shifted between attention layers,
# so deployment does not need seven sequential head calls.
max_steps: 500
batch_size: 1
num_anchor_blocks: 64
learning_rate: 2.0e-4
warmup_ratio: 0.08
weight_decay: 0.01
max_grad_norm: 1.0
hidden_loss_weight: 0.15
embedding_loss_weight: 0.08
prefix_loss_weight: 1.0
prefix_weight_decay: 0.93
state_size: 768
num_layers: 3
num_heads: 12
drafter_mode: parallel
dropout: 0.0
teacher_forcing_start: 0.0
teacher_forcing_end: 0.0
teacher_forcing_decay_ratio: 1.0
feedback_mode: continuous
flow_diagonal_fraction: 0.20
flow_diagonal_loss_weight: 0.08
flow_consistency_weight: 0.03
flow_time_min: 0.05
dtype: bf16
attn_implementation: eager
eval_every: 100
eval_batches: 24
eval_anchor_blocks: 64
early_stopping_patience: 5
seed: 282
num_workers: 2
log_every: 20
