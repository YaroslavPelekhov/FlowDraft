# R2Flow pilot: learn a one-jump correction J(y0) -> J^2(y0) from frozen AR
# verifier residuals.  The parent FlowDraft adapter is frozen throughout.
max_steps: 100
batch_size: 1
gradient_accumulation_steps: 1
num_anchor_blocks: 16
learning_rate: 3.0e-4
warmup_ratio: 0.08
weight_decay: 0.01
max_grad_norm: 1.0
prefix_loss_weight: 1.0
prefix_weight_decay: 0.88
bottleneck_size: 384
num_layers: 2
num_heads: 6
dropout: 0.0
dtype: bf16
attn_implementation: eager
eval_every: 25
eval_batches: 8
eval_anchor_blocks: 16
early_stopping_patience: 3
seed: 23
source_seed: 4242
num_workers: 2
log_every: 10
