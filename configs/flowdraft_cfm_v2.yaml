# Faithful CFM adaptation on top of the frozen Orthrus AR teacher.
# Paths are supplied by the launcher. The 600-step cap protects against the
# observed late-run degradation; holdout early stopping normally ends earlier.
upstream_dir: upstream_orthrus
base_model: Qwen/Qwen3-1.7B
block_size: 32
mask_token_id: 151669
num_anchor_blocks: 64
batch_size: 1
gradient_accumulation_steps: 16
learning_rate: 3.0e-5
warmup_ratio: 0.03
weight_decay: 0.0
max_grad_norm: 1.0
dtype: bf16
attn_implementation: eager
temperature: 1.0
kl_reduction: tokenmean

flow_objective: ecld
diagonal_fraction: 0.50
flow_time_logit_mean: -0.4
flow_time_logit_std: 1.0
flow_time_max: 0.95
flow_state_adapter: true
flow_adapter_bottleneck: 256
flow_time_conditioning_scale: 0.0
endpoint_transport: dense
endpoint_vocab_chunk_size: 8192
one_jump_fraction: 0.75
ecld_time_weight: paper_clamped
temporal_difference_epsilon: 0.02
temporal_drift_weight: 1.0

# Stage 1 teaches the new state adapter the diagonal VFM endpoint map. Stage 2
# adds exact (0 -> 1) frozen-AR distillation with prefix-weighted CE, while
# ECLD is restricted to the remaining interior trajectory pairs.
hard_ce_weight: 0.0
prefix_loss_weight: 0.05
prefix_kl_weight: 0.0
direct_endpoint_teacher_weight: 0.05
consistency_weight: 0.00025
consistency_start_step: 50

max_steps: 600
eval_every: 50
eval_batches: 64
eval_anchor_blocks: 8
eval_seed: 1701
best_metric: eval_greedy_prefix_acceptance
early_stopping_patience: 4
save_every: 50
checkpoint_format: trainable
save_trainer_state: false
allow_missing_init_trainables: true
gradient_checkpointing: false
compile: false
seed: 17
num_workers: 2
log_every: 10
