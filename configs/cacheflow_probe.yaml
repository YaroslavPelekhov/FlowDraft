# CacheFlow probe: a one-jump conditional endpoint map over future final hidden
# states. The frozen Qwen verifier remains the sole authority at inference.
max_steps: 100
batch_size: 1
num_anchor_blocks: 32
learning_rate: 3.0e-4
warmup_ratio: 0.08
weight_decay: 0.01
max_grad_norm: 1.0
hidden_loss_weight: 1.0
teacher_kl_weight: 1.0
prefix_loss_weight: 0.5
prefix_weight_decay: 0.88
latent_size: 256
num_layers: 2
num_heads: 8
dropout: 0.0
dtype: bf16
attn_implementation: eager
eval_every: 25
eval_batches: 8
eval_anchor_blocks: 32
early_stopping_patience: 3
seed: 37
source_seed: 901
num_workers: 2
log_every: 10
