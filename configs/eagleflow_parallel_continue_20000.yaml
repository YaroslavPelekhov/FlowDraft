# Long continuation from the validated 3k endpoint-flow head. The token
# bootstrap is already complete, so every optimization step uses the same
# self-conditioned graph as one-pass decoding.
max_steps: 20000
batch_size: 1
num_anchor_blocks: 64
learning_rate: 8.0e-5
warmup_ratio: 0.02
weight_decay: 0.01
max_grad_norm: 1.0
hidden_loss_weight: 0.10
embedding_loss_weight: 0.10
prefix_loss_weight: 1.25
prefix_weight_decay: 0.85
state_size: 768
num_layers: 3
num_heads: 12
drafter_mode: parallel
dropout: 0.0
teacher_forcing_start: 0.0
teacher_forcing_end: 0.0
teacher_forcing_decay_ratio: 1.0
feedback_mode: continuous
flow_diagonal_fraction: 0.10
flow_diagonal_loss_weight: 0.05
flow_consistency_weight: 0.02
flow_time_min: 0.05
dtype: bf16
attn_implementation: eager
eval_every: 500
eval_batches: 32
eval_anchor_blocks: 64
early_stopping_patience: 15
seed: 284
num_workers: 2
log_every: 50
