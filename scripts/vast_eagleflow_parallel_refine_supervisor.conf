[program:eagleflow_parallel_refine]
command=/opt/supervisor-scripts/eagleflow-parallel-refine.sh
directory=/workspace/FlowDraft-cfmproper
autostart=false
autorestart=false
startsecs=3
stopwaitsecs=180
stdout_logfile=/workspace/flowdraft_runs/eagleflow_parallel_refine_3000_r1/supervisor.log
stderr_logfile=/workspace/flowdraft_runs/eagleflow_parallel_refine_3000_r1/supervisor.err.log
redirect_stderr=false
environment=PYTHONUNBUFFERED="1"
