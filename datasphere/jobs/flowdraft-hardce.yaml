name: flowdraft-hardce-quick
desc: FlowDraft hard-CE quick comparison launched from local Codex via DataSphere Jobs.

cmd: bash datasphere/job_flowdraft_hardce.sh

env:
  vars:
    - HF_TOKEN
    - MAX_STEPS: "600"
    - MAX_SEQUENCES: "20000"
    - EVAL_SEQUENCES: "512"
    - FLOW_STEPS: "1"
    - HARD_CE_WEIGHT: "0.5"
    - CONSISTENCY_WEIGHT: "0.0"
    - KEEP_CHECKPOINTS: "0"
    - HF_REPO_ID
    - HF_RUN_PATH: ""
  python:
    type: manual
    version: "3.10"
    requirements-file: requirements-datasphere.txt

flags:
  - attach-project-disk

cloud-instance-types:
  - g1.1

working-storage:
  type: SSD
  size: 100Gb

outputs:
  - outputs
